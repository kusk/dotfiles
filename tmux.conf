# use control+a as a prefix like screen
unbind-key C-b
bind-key C-a send-prefix
set-option -g prefix C-a
bind-key space next-window



set -g mode-mouse on
set -g mouse-resize-pane on
set -g mouse-select-pane on
set -g mouse-select-window on


# colors hurt my eyes
set -g status-bg colour235
set -g status-fg white
set -g status-left '#[fg=colour33]#(whoami)#[fg=colour253]# @#[fg=colour33]#(hostname -s)'
set -g status-right '#[fg=blue]# %y %H:%M'
set -g status-right-length 40
# Highlight active window
set-window-option -g window-status-current-bg colour190
set-window-option -g window-status-current-fg colour232
set -g window-status-activity-attr bold
set -g window-status-current-format "#[fg=colour225,bg=colour39] #[fg=colour255,bg=colour39,noreverse,bold] #I  #W #[fg=colour39,bg=colour234,nobold]"
set -g window-status-format "#[fg=colour243,bg=colour234] #I #W "
# Automatically set window title
setw -g automatic-rename

set-option -g pane-border-fg white
set-option -g pane-active-border-fg green


set -g status-interval 1

set -g base-index 1

set -s escape-time 0

bind-key -n M-w last-pane  #Skift pane med Alt-w
bind-key h split-window -h #
bind-key v split-window -v





set -g pane-border-bg black
set -g pane-border-fg white
set -g pane-active-border-bg black
set -g pane-active-border-fg blue
