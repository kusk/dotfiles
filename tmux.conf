# First stuff
unbind-key C-b
bind-key C-a send-prefix
set-option -g prefix C-a
set -g history-limit 100000
set-window-option -g mode-keys vi


# theme stuff

# theme stuff
set -g status-justify centre

# window stuff
bind-key space next-window
bind tab choose-window -Zw      # Tab for window-list

# copy stuff
# bind C-s copy-mode
set-option -g mouse on
setw -g mode-keys vi
set-option -s set-clipboard off
bind P paste-buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X rectangle-toggle
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'xclip -se c -i'
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys  -X copy-pipe-and-cancel 'xclip -se -c -i'

# pane stuff
bind Up    split-window -b -v  # Create pane above
bind Down  split-window -v     # Create pane below
bind Left  split-window -b -h  # Create pane left
bind Right split-window -h     # Create pane right
bind Enter break-pane          # Move pane to new window

# Logs
bind p capture-pane \; capture-pane -S - \; save-buffer "tmux.log" \; delete-buffer \; display-message "Log saved to $PWD" \; # Save buffer to file in start directory

# search
bind-key / copy-mode \; send-key ?



# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 100

# fzf
TMUX_FZF_LAUNCH_KEY="f"
TMUX_FZF_OPTIONS="-p -w 80% -h 48% -m"


#set-option -g status on
#set-option -g status-interval 2
#set-option -g status-justify "centre"
#set-option -g status-left-length 60
#set-option -g status-right-length 90
#set-option -g status-left "#(~/.tmux-powerline/powerline.sh left)"
#set-option -g status-right "#(~/.tmux-powerline/powerline.sh right)"
#set-hook -g session-created 'run-shell "~/.tmux-powerline/powerline.sh init"'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'sainnhe/tmux-fzf'
#set -g @plugin 'wfxr/tmux-power'
set -g @plugin "arcticicestudio/nord-tmux"
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
