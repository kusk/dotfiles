[general]
cfg_schema = 1
UseWorkarea = True
ModMask = <Alt>

[keys]
C = move-to-center
H = horizontal-maximize
V = vertical-maximize
KP_0 = maximize
Delete = bottom-left
Down = bottom
KP_4 = bottom-right
Left = left
Home = middle
Right = right
Insert = top-left
Up = top
KP_1 = top-right
KP_Enter = monitor-switch
